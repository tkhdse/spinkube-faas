#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "bench-float"
version = "0.1.0"
authors = ["tkhadse2"]
description = ""

[[trigger.http]]
route = "/..."
component = "bench-float"

[component.bench-float]
source = "target/wasm32-wasip1/release/bench_float.wasm"
allowed_outbound_hosts = []
[component.bench-float.build]
command = "cargo build --target wasm32-wasip1 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
