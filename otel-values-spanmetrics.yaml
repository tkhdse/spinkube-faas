mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.150.1

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 9464
    servicePort: 9464
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    jaeger:
      protocols:
        grpc: {}

  processors:
    batch: {}

  connectors:
    spanmetrics:
      histogram:
        explicit:
          buckets: [2ms, 4ms, 6ms, 8ms, 10ms, 50ms, 100ms, 200ms, 400ms, 800ms, 1s, 1400ms, 2s, 5s, 10s, 15s]
      dimensions:
        - name: http.method
        - name: http.status_code
      exemplars:
        enabled: true
      metrics_flush_interval: 15s
      metrics_expiration: 5m
      namespace: traces_spanmetrics

  exporters:
    # keep if Jaeger is running and endpoint is valid
    otlp/jaeger:
      endpoint: jaeger.default.svc.cluster.local:4317
      tls:
        insecure: true

    # recommended for kube-prom-stack: expose :9464 and scrape via ServiceMonitor
    prometheus:
      endpoint: 0.0.0.0:9464

  service:
    pipelines:
      traces:
        receivers: [otlp, jaeger]
        processors: [batch]
        exporters: [otlp/jaeger, spanmetrics]
      metrics:
        receivers: [otlp, spanmetrics]
        processors: [batch]
        exporters: [prometheus]